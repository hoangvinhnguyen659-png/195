<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trắc Nghiệm Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <div id="loading-screen" class="screen active">
            <div class="welcome-card">
                <h1 class="app-title">Trắc Nghiệm Pro</h1>
                <p id="status-text">Đang kết nối dữ liệu...</p>
                
                <div id="setup-options" class="hidden">
                    <div class="toggle-wrapper">
                        <label class="toggle-switch">
                            <input type="checkbox" id="shuffle-checkbox">
                            <span class="slider"></span>
                        </label>
                        <span class="label-text">Trộn câu hỏi</span>
                    </div>

                    <div class="mode-buttons">
                        <button class="btn-start btn-primary" id="btn-tracnghiem">Trắc nghiệm</button>
                        <button class="btn-start btn-secondary" id="btn-dungsai">Đúng / Sai</button>
                        <div class="qr-container">
                            <p>Ủng hộ tác giả ❤️</p>
                            <div class="qr-card-wrapper">
                                <img src="snapedit_1766298911519.jpeg" alt="QR Code">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <div class="quiz-header sticky-header">
                <div class="header-info">
                    <div class="info-item left">Câu <span id="current-count">0</span>/<span id="total-count">0</span></div>
                    
                    <div class="info-item center">
                        <button id="dark-mode-toggle" class="icon-btn" onclick="toggleDarkMode()">
                            <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px; height:24px;">
                                <path id="icon-path" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="info-item right">
                        <button id="btn-home-nav" onclick="location.reload()">Trang chủ</button>
                    </div>
                </div>
                <div class="progress-bg"><div id="progress-bar"></div></div>
            </div>
            
            <div class="quiz-scroll-area">
                <div id="quiz-feed" class="quiz-body"></div>
                <div style="height: 60px;"></div> 
            </div>
        </div>

        <div id="result-screen" class="screen hidden">
            <div class="result-card">
                <h2 class="result-title">Xong rồi!</h2>
                <div class="score-label">Số câu đúng</div>
                <div class="score-box">
                    <span id="final-score">0/0</span>
                </div>
                
                <div class="result-actions">
                    <button class="btn-start btn-primary" onclick="restartQuiz()">Làm Lại</button>
                    <button class="btn-start btn-outline" onclick="location.reload()">Về Trang Chủ</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
