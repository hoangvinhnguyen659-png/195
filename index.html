<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ôn Tập Tin Học 12</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="update-toast" class="toast-hidden">
        <div class="toast-content">
            <span class="toast-icon">🚀</span>
            <div class="toast-text">
                <strong>Cập nhật mới!</strong>
                <p>Trắc nghiệm & Đúng/sai<br>Nguồn: TIN 12_ONTAP CKII</p>
            </div>
            <button id="close-toast" onclick="closeToast()">×</button>
        </div>
    </div>

    <button id="theme-toggle" title="Đổi giao diện"></button>

    <div class="app-container">
        
        <div id="loading-screen" class="screen active">
            <div class="welcome-card">
                <h1 class="app-title">Trắc Nghiệm</h1>
                <p id="status-text">Đang kết nối dữ liệu...</p>
                
                <div id="setup-options" class="hidden">
                    <div class="toggle-wrapper">
                        <label class="toggle-switch">
                            <input type="checkbox" id="shuffle-checkbox">
                            <span class="slider"></span>
                        </label>
                        <span class="label-text">Trộn câu hỏi</span>
                    </div>

                    <div class="mode-buttons">
                        <button class="btn-start btn-primary" id="btn-tracnghiem">Trắc nghiệm</button>
                        <button class="btn-start btn-secondary" id="btn-dungsai">Đúng / Sai</button>
                        
                        <div class="qr-container" style="margin-top: 25px; text-align: center;">
                            <p style="margin-bottom: 12px; font-size: 1em; font-weight: 600; color: var(--text);">Ủng hộ tác giả ❤️</p>
                            <div class="qr-card-wrapper">
                                <img src="https://raw.githubusercontent.com/hoangvinhnguyen659-png/Meo/main/snapedit_1766298911519.jpeg" 
                                     id="qr-trigger" 
                                     alt="Momo QR" 
                                     style="cursor: pointer; width: 200px; border-radius: 12px; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.1);"
                                     title="Nhấn để mở Momo">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <div class="quiz-header sticky-header">
                <div class="header-info">
                    <div class="info-item left">Câu <span id="current-count">0</span>/<span id="total-count">0</span></div>
                    <div class="info-item center">Đúng: <span id="live-score">0</span></div>
                    <div class="info-item right">
                        <button id="btn-home-nav" onclick="location.reload()">Thoát</button>
                    </div>
                </div>
                <div class="progress-bg"><div id="progress-bar"></div></div>
            </div>
            
            <div class="quiz-scroll-area">
                <div id="quiz-feed" class="quiz-body"></div>
                <div style="height: 100px;"></div> 
            </div>
        </div>

        <div id="result-screen" class="screen hidden">
            <div class="result-card">
                <div class="result-icon">🎉</div>
                <h2 class="result-title">Hoàn thành!</h2>
                <div class="score-label">Kết quả của bạn:</div>
                <div class="score-box">
                    <span id="final-score">0/0</span>
                </div>
                
                <div class="result-actions">
                    <button class="btn-start btn-primary" onclick="location.reload()">Làm Lại</button>
                    <button class="btn-start btn-outline" onclick="location.reload()">Về Trang Chủ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
